{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | Cascate Porte - Администрирование{% endblock %}

{% block branding %}
<div style="display: flex; align-items: center; gap: 15px;">
    <h1 id="site-name" style="margin: 0;">
        <a href="{% url 'admin:index' %}" style="color: white; text-decoration: none; font-size: 24px; font-weight: 600;">
            <span style="font-family: 'Georgia', serif; font-weight: 700;">Cascate</span> <span style="color: #8B7355; font-style: italic; font-weight: 400;">Porte</span>
        </a>
    </h1>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" type="text/css" href="{% static 'admin/css/admin.css' %}">
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #f5f7fa;
        color: #2c3e50;
    }
    
    #container {
        background: #f5f7fa;
    }
    
    /* Additional improvements */
    .help-block {
        background: #e7f3ff;
        border-left: 4px solid #20B2AA;
        padding: 12px 16px;
        border-radius: 4px;
        margin-top: 8px;
        font-size: 13px;
        color: #2c3e50;
    }
    
    /* Better checkbox styling */
    input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
        margin-right: 8px;
    }
    
    /* File upload improvements */
    .file-upload p.file-upload {
        background: #f8f9fa;
        border: 2px dashed #dee2e6;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        margin: 10px 0;
    }
    
    .file-upload p.file-upload:hover {
        border-color: #20B2AA;
        background: #e0f7f5;
    }
</style>
{% endblock %}
